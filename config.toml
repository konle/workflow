[server]
port = 3000

[database]
mongo_url = "mongodb://127.0.0.1:27017"
redis_url = "redis://127.0.0.1:6379"

[log]
level = "debug"
format = "pretty"

[security]
variable_encrypt_key = "workflow-default-encrypt-key-change-me"

[sweeper]
enabled = true
interval_secs = 60
max_recover_per_cycle = 10

[init]
admin_username = "admin"
admin_password = "admin123"
admin_email = "admin@workflow.local"
default_tenant_name = "default"
default_tenant_description = "Default tenant"
